<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ประตูสู่โลกอนาคต โดย ครูบิ๊กกี้</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root {
            --tech-blue: #00d2ff;
            --tech-purple: #3a7bd5;
            --glass: rgba(255, 255, 255, 0.9);
        }

        * { box-sizing: border-box; }
        body, html {
            margin: 0; padding: 0; font-family: 'Prompt', sans-serif;
            height: 100vh; overflow: hidden; background: #0f2027;
            display: flex; justify-content: center; align-items: center;
        }

        /* พื้นหลังล้ำสมัย */
        .bg-tech {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=1920&auto=format&fit=crop') center/cover;
            filter: blur(5px) brightness(0.4); z-index: -2;
        }

        /* อนุภาคอิโมจิลอย (AI, Robot, Tech) */
        .particles span {
            position: absolute; bottom: -50px; font-size: 2rem; opacity: 0.5;
            animation: floatUp 15s linear infinite; z-index: -1;
        }
        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            50% { opacity: 0.6; }
            100% { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
        }

        /* Container หลัก */
        .main-card {
            background: var(--glass); backdrop-filter: blur(15px);
            border-radius: 30px; width: 90%; max-width: 800px;
            padding: 40px; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            text-align: center; position: relative; border: 2px solid var(--tech-blue);
        }

        .header h1 { color: #2c3e50; margin: 0; font-size: 2rem; }
        .header p { color: #555; margin-bottom: 25px; }

        /* ส่วนสแกนใบหน้า */
        .scan-container { position: relative; width: 480px; height: 360px; margin: 0 auto; border-radius: 20px; overflow: hidden; border: 5px solid #fff; }
        #video { width: 480px; height: 360px; object-fit: cover; }
        #overlay { position: absolute; top:0; left:0; }
        
        /* แถบพลังรอยยิ้ม */
        .smile-bar-container { width: 100%; background: #eee; height: 20px; border-radius: 10px; margin-top: 15px; overflow: hidden; display: none; }
        #smile-progress { width: 0%; height: 100%; background: linear-gradient(90deg, #00d2ff, #3a7bd5); transition: 0.3s; }

        /* ส่วนแบบทดสอบ */
        .quiz-container { display: none; text-align: left; animation: fadeIn 1s; }
        .question { font-size: 1.3rem; font-weight: 600; margin-bottom: 20px; color: #333; }
        .option-btn {
            display: block; width: 100%; padding: 15px; margin-bottom: 10px;
            background: white; border: 2px solid #ddd; border-radius: 12px;
            cursor: pointer; font-family: 'Prompt'; font-size: 1.1rem; transition: 0.3s;
        }
        .option-btn:hover { background: #e3f2fd; border-color: var(--tech-blue); transform: translateX(10px); }

        /* ส่วนสรุปผล */
        .result-container { display: none; animation: zoomIn 0.8s; }
        .career-title { font-size: 2.5rem; color: var(--tech-purple); font-weight: bold; }
        .encourage-text { font-size: 1.2rem; color: #444; margin: 20px 0; line-height: 1.6; }

        footer { margin-top: 30px; font-weight: bold; color: #2c3e50; opacity: 0.8; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes zoomIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>
    <div class="bg-tech"></div>
    <div class="particles" id="particles"></div>

    <div class="main-card">
        <div id="scan-step">
            <div class="header">
                <h1><i class="fas fa-robot"></i> ด่านตรวจความสุข</h1>
                <p>ยิ้มกว้างๆ ให้กล้องเป็นเวลา 5 วินาที เพื่อเปิดประตูสู่โลกอนาคตนะ!</p>
            </div>
            <div class="scan-container">
                <video id="video" autoplay muted playsinline></video>
                <canvas id="overlay"></canvas>
            </div>
            <div class="smile-bar-container" id="bar-ui">
                <div id="smile-progress"></div>
            </div>
            <p id="status-msg">กำลังโหลด AI...</p>
        </div>

        <div id="quiz-step" class="quiz-container">
            <div id="quiz-content">
                </div>
        </div>

        <div id="result-step" class="result-container">
            <h2 id="result-emoji" style="font-size: 4rem;">🤖</h2>
            <div class="career-title" id="career-name">นักวิเคราะห์ AI</div>
            <div class="encourage-text" id="encourage-msg"></div>
            <button class="option-btn" onclick="location.reload()" style="background: var(--tech-blue); color:white;">ทำใหม่อีกครั้ง <i class="fas fa-redo"></i></button>
        </div>

        <footer>
            สื่อสร้างสรรค์ โดย ครูบิ๊กกี้ | <i class="fas fa-code"></i> AI Tech Lab
        </footer>
    </div>

    <script>
        const GAS_URL = "ใส่_URL_ของ_GOOGLE_APPS_SCRIPT_ที่นี่";
        
        let smileStartTime = null;
        const smileTarget = 5000; // 5 วินาที
        let isSuccess = false;

        // 1. สร้างอนุภาค Tech ลอย
        const techIcons = ['🤖', '💻', '🚀', '🛰️', '👾', '💾', '⚙️', '💡'];
        const pContainer = document.getElementById('particles');
        for(let i=0; i<15; i++) {
            let s = document.createElement('span');
            s.innerText = techIcons[Math.floor(Math.random()*techIcons.length)];
            s.style.left = Math.random() * 100 + 'vw';
            s.style.animationDuration = (Math.random() * 5 + 10) + 's';
            s.style.animationDelay = (Math.random() * 5) + 's';
            pContainer.appendChild(s);
        }

        // 2. โหลด AI และกล้อง
        async function init() {
            const MODEL_URL = 'https://cdn.jsdelivr.net/gh/justadudewhohacks/face-api.js@master/weights';
            await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
            await faceapi.nets.faceExpressionNet.loadFromUri(MODEL_URL);
            
            navigator.mediaDevices.getUserMedia({ video: true })
                .then(stream => {
                    document.getElementById('video').srcObject = stream;
                    document.getElementById('status-msg').innerText = "เตรียมตัวนะ... ยิ้มเลย!";
                    document.getElementById('bar-ui').style.display = 'block';
                })
                .catch(err => Swal.fire('ไม่พบกล้อง', 'กรุณาตรวจสอบการเชื่อมต่อกล้องนะ', 'error'));
        }

        const video = document.getElementById('video');
        video.addEventListener('play', () => {
            const canvas = document.getElementById('overlay');
            const displaySize = { width: 480, height: 360 };
            faceapi.matchDimensions(canvas, displaySize);

            setInterval(async () => {
                if(isSuccess) return;

                const detections = await faceapi.detectAllFaces(video, new faceapi.TinyFaceDetectorOptions()).withFaceExpressions();
                const resized = faceapi.resizeResults(detections, displaySize);
                canvas.getContext('2d').clearRect(0, 0, 480, 360);
                faceapi.draw.drawDetections(canvas, resized);

                if (detections.length > 0) {
                    const expressions = detections[0].expressions;
                    if (expressions.happy > 0.8) {
                        if (!smileStartTime) smileStartTime = Date.now();
                        const elapsed = Date.now() - smileStartTime;
                        const progress = Math.min((elapsed / smileTarget) * 100, 100);
                        document.getElementById('smile-progress').style.width = progress + '%';

                        if (elapsed >= smileTarget) {
                            isSuccess = true;
                            smileSuccess();
                        }
                    } else {
                        if(smileStartTime) {
                            smileStartTime = null;
                            document.getElementById('smile-progress').style.width = '0%';
                            document.getElementById('status-msg').innerText = "อย่าเพิ่งหุบยิ้ม! เริ่มนับใหม่นะ...";
                        }
                    }
                }
            }, 100);
        });

        function smileSuccess() {
            Swal.fire({
                title: 'รอยยิ้มสุดยอดเลย!',
                text: 'ประตูเปิดออกแล้ว ไปทำแบบทดสอบกัน!',
                icon: 'success',
                confirmButtonText: 'ไปกันเลย 🚀'
            }).then(() => {
                document.getElementById('scan-step').style.display = 'none';
                document.getElementById('quiz-step').style.display = 'block';
                startQuiz();
            });
        }

        // 3. ระบบแบบทดสอบจิตวิทยา
        const quizData = [
            {
                q: "ถ้ามีหุ่นยนต์ 1 ตัว เธออยากให้มันทำอะไรให้?",
                options: [
                    { t: "เขียนโปรแกรมและแก้โจทย์เลขยากๆ", type: "tech" },
                    { t: "ช่วยดูแลคนป่วยและพูดคุยให้กำลังใจ", type: "social" },
                    { t: "ออกแบบชุดสวยๆ และวาดรูป", type: "creative" }
                ]
            },
            {
                q: "เวลาว่าง เธอชอบทำอะไรมากที่สุด?",
                options: [
                    { t: "แกะของเล่นออกมาดูระบบข้างใน", type: "tech" },
                    { t: "ปลูกต้นไม้หรือช่วยเหลือสัตว์", type: "social" },
                    { t: "แต่งนิทานหรือถ่ายคลิปวิดีโอ", type: "creative" }
                ]
            }
        ];

        let currentQ = 0;
        let scores = { tech: 0, social: 0, creative: 0 };

        function startQuiz() {
            const q = quizData[currentQ];
            let html = `<div class="question">${currentQ+1}. ${q.q}</div>`;
            q.options.forEach(opt => {
                html += `<button class="option-btn" onclick="answerQuiz('${opt.type}')">${opt.t}</button>`;
            });
            document.getElementById('quiz-content').innerHTML = html;
        }

        function answerQuiz(type) {
            scores[type]++;
            currentQ++;
            if(currentQ < quizData.length) {
                startQuiz();
            } else {
                showResult();
            }
        }

        // 4. สรุปผล
        function showResult() {
            document.getElementById('quiz-step').style.display = 'none';
            document.getElementById('result-step').style.display = 'block';

            let finalType = Object.keys(scores).reduce((a, b) => scores[a] > scores[b] ? a : b);
            
            const results = {
                tech: { 
                    name: "วิศวกรซอฟต์แวร์อนาคต", 
                    emoji: "🚀", 
                    msg: "เธอมีความคิดที่เป็นระบบและหลงใหลในเทคโนโลยี! โลกต้องการนักสร้างอย่างเธอนะ ครูบิ๊กกี้ขอเป็นกำลังใจให้เธอสร้างนวัตกรรมที่เปลี่ยนโลกได้!" 
                },
                social: { 
                    name: "ที่ปรึกษาด้านความสุข", 
                    emoji: "💖", 
                    msg: "ใจที่อ่อนโยนของเธอคือพลังที่ยิ่งใหญ่! อาชีพที่ได้ช่วยเหลือผู้อื่นจะทำให้เธอมีความสุขที่สุด เดินตามความฝันนะ ครูบิ๊กกี้อยู่ข้างๆ เสมอ!" 
                },
                creative: { 
                    name: "นักออกแบบโลกเสมือน (Metaverse)", 
                    emoji: "🎨", 
                    msg: "จินตนาการของเธอไม่มีที่สิ้นสุด! อย่าหยุดสร้างสรรค์สิ่งใหม่ๆ นะ เพราะความสวยงามของโลกนี้ขึ้นอยู่กับปลายพู่กันของเธอ!" 
                }
            };

            const final = results[finalType];
            document.getElementById('career-name').innerText = final.name;
            document.getElementById('result-emoji').innerText = final.emoji;
            document.getElementById('encourage-msg').innerText = final.msg;

            // ส่งข้อมูลลง Sheet
            fetch(GAS_URL, {
                method: "POST",
                mode: "no-cors",
                body: JSON.stringify({ career: final.name, message: final.msg })
            });
        }

        init();
    </script>
</body>
</html>
