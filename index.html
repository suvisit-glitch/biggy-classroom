<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ประตูสู่โลกอนาคต โดย ครูบิ๊กกี้</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root {
            --primary: #00d2ff;
            --accent: #3a7bd5;
            --glass: rgba(255, 255, 255, 0.85);
            --text: #2c3e50;
        }

        * { box-sizing: border-box; }
        body, html {
            margin: 0; padding: 0; font-family: 'Prompt', sans-serif;
            height: 100vh; overflow: hidden; background: #0f2027;
            display: flex; justify-content: center; align-items: center;
        }

        /* พื้นหลัง Space & Tech */
        .bg-tech {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=1920&auto=format&fit=crop') center/cover;
            filter: blur(5px) brightness(0.4); z-index: -2;
        }

        /* อนุภาคอิโมจิลอย (Tech & Robot) */
        .particles span {
            position: absolute; bottom: -50px; font-size: 2rem; opacity: 0.5;
            animation: floatUp 15s linear infinite; z-index: -1;
        }
        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            50% { opacity: 0.6; }
            100% { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
        }

        /* Container หลักสไตล์ Glassmorphism */
        .main-card {
            background: var(--glass); backdrop-filter: blur(15px);
            border-radius: 30px; width: 90%; max-width: 800px;
            padding: 40px; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            text-align: center; position: relative; border: 3px solid white;
        }

        .header h1 { color: #1a252f; margin: 0; font-size: 2rem; text-shadow: 1px 1px 2px rgba(0,0,0,0.1); }
        .header p { color: #555; margin-bottom: 25px; }

        /* ส่วนสแกนใบหน้าและป้องกันกล้องดำ */
        .scan-container {
            position: relative; width: 480px; height: 360px; margin: 0 auto;
            border-radius: 20px; overflow: hidden; border: 5px solid #fff;
            background: black; /* พื้นหลังสีดำเวลารอโหลด */
            display: flex; justify-content: center; align-items: center;
        }
        #video { position: absolute; top: 0; left: 0; width: 480px; height: 360px; object-fit: cover; }
        #overlay { position: absolute; top: 0; left: 0; z-index: 5; }
        
        /* แจ้งสถานะหน้าจอ */
        .status-msg { position: absolute; z-index: 10; color: white; font-weight: bold; font-size: 1.2rem; }

        /* แถบพลังรอยยิ้ม */
        .bar-container { width: 100%; background: #e0e0e0; height: 18px; border-radius: 10px; margin-top: 15px; overflow: hidden; display: none; }
        #smile-bar { width: 0%; height: 100%; background: linear-gradient(90deg, #00d2ff, #3a7bd5); transition: 0.3s; }

        /* แบบทดสอบ 10 ข้อ */
        .quiz-container { display: none; text-align: left; animation: fadeIn 0.8s; }
        .question { font-size: 1.3rem; font-weight: 600; margin-bottom: 15px; color: var(--text); border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .option-btn {
            display: block; width: 100%; padding: 15px; margin-bottom: 10px;
            background: white; border: 2px solid #ddd; border-radius: 12px;
            cursor: pointer; font-family: 'Prompt'; font-size: 1.1rem; transition: 0.3s;
        }
        .option-btn:hover { background: #e3f2fd; border-color: var(--primary); transform: translateX(8px); }
        
        /* ส่วนสรุปผล */
        .result-container { display: none; animation: zoomIn 0.8s; }
        .career-title { font-size: 2.5rem; color: var(--accent); font-weight: bold; margin: 10px 0; }
        .encourage-text { font-size: 1.2rem; color: #444; line-height: 1.6; max-width: 600px; margin: 20px auto; }

        footer { margin-top: 30px; font-weight: bold; color: var(--text); opacity: 0.8; font-size: 1rem; }
        footer i { color: #f1c40f; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes zoomIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>
    <div class="bg-tech"></div>
    <div class="particles" id="emojiContainer"></div>

    <div class="main-card">
        <div id="scanStep">
            <div class="header">
                <h1><i class="fas fa-smile-wink"></i> ด่านตรวจความสุข</h1>
                <p>ยิ้มกว้างๆ ให้กล้องเป็นเวลา 5 วินาที เพื่อเปิดประตูสู่โลกอนาคตนะ!</p>
            </div>
            <div class="scan-container">
                <div class="status-msg" id="statusText">กำลังเปิดกล้อง...</div>
                <video id="video" width="480" height="360" autoplay muted playsinline></video>
                <canvas id="overlay" width="480" height="360"></canvas>
            </div>
            <div class="bar-container" id="barUI">
                <div id="smile-bar"></div>
            </div>
        </div>

        <div id="quizStep" class="quiz-container">
            <div id="quizContent"></div>
        </div>

        <div id="resultStep" class="result-container">
            <h2 id="resultEmoji" style="font-size: 4rem; margin: 0;">🚀</h2>
            <div class="career-title" id="careerName"></div>
            <div class="encourage-text" id="encourageMsg"></div>
            <button class="option-btn" onclick="location.reload()" style="background: var(--primary); color:white; max-width:200px; margin: 0 auto; display:flex; align-items:center; justify-content:center; gap:10px;">ทำใหม่อีกครั้ง <i class="fas fa-redo"></i></button>
        </div>

        <footer>
            <i class="fas fa-magic"></i> สื่อสร้างสรรค์ โดย ครูบิ๊กกี้ | <i class="fas fa-robot"></i> <i class="fas fa-rocket"></i> AI Tech Lab
        </footer>
    </div>

    <script>
        // === สำคัญ: นำ URL ของ Web App จาก Google Apps Script มาใส่ตรงนี้ ===
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxMJ4iOa_49RTwGUlUuRUYLL9d6K9uehbfZ7qUf-IKxzfUbpbFJ1ObvU-RPYEiXm6YQ/exec"; 
        
        // รวบรวมฟังก์ชันให้อยู่ใน EventDOMContentLoaded เพื่อความเสถียร
        document.addEventListener("DOMContentLoaded", function() {
            const video = document.getElementById('video');
            const canvas = document.getElementById('overlay');
            const statusText = document.getElementById('statusText');
            const barUI = document.getElementById('barUI');
            const smileBar = document.getElementById('smile-bar');

            // 1. สร้าง Emojis พื้นหลัง
            const emojis = ['🏫', '👨‍🏫', '😄', '📚', '🎨', '✨', '💡', '🤖', '🚀', '💻'];
            const container = document.getElementById('emojiContainer');
            for(let i=0; i<15; i++) {
                let span = document.createElement('span');
                span.innerText = emojis[Math.floor(Math.random()*emojis.length)];
                span.style.left = `${Math.random() * 100}vw`;
                span.style.animationDuration = `${Math.random() * 5 + 10}s`;
                span.style.animationDelay = `${Math.random() * 5}s`;
                span.style.fontSize = `${Math.random() * 15 + 20}px`;
                container.appendChild(span);
            }

            // 2. ระบบ AI และกล้อง (เพิ่มโค้ดแจ้งสถานะกลางจอ)
            async function startApp() {
                try {
                    statusText.innerHTML = '<i class="fas fa-spinner fa-spin"></i> กำลังโหลด AI... กรุณารอ';
                    
                    const MODEL_URL = 'https://cdn.jsdelivr.net/gh/justadudewhohacks/face-api.js@master/weights';
                    await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
                    await faceapi.nets.faceExpressionNet.loadFromUri(MODEL_URL);
                    
                    statusText.innerHTML = '<i class="fas fa-spinner fa-spin"></i> เตรียม AI สำเร็จ กำลังดึงภาพ...';
                    
                    navigator.mediaDevices.getUserMedia({ video: { width: 480, height: 360 }, audio: false })
                        .then(stream => {
                            video.srcObject = stream;
                            // ซ่อนข้อความสถานะเมื่อกล้องติดแล้ว
                            statusText.style.display = 'none'; 
                        })
                        .catch(err => {
                            console.error("Camera error:", err);
                            statusText.innerHTML = '<span style="color:#ff6b6b;"><i class="fas fa-video-slash"></i> ไม่พบกล้อง หรือถูกบล็อก <br> กรุณาตรวจสอบสิทธิ์การเข้าถึงนะครับ</span>';
                        });

                } catch (error) {
                    console.error("AI Error:", error);
                    statusText.innerHTML = '<span style="color:#ff6b6b;"><i class="fas fa-exclamation-triangle"></i> โหลด AI ไม่สำเร็จ ตรวจสอบอินเทอร์เน็ต</span>';
                }
            }

            // 3. เริ่มสแกนรอยยิ้ม
            let isSmileDetected = false;
            let smileStartTime = null;
            const smileTarget = 5000; // 5 วินาที

            video.addEventListener('play', () => {
                barUI.style.display = 'block'; // แสดงแถบพลังเมื่อกล้องทำงาน
                const displaySize = { width: 480, height: 360 };
                faceapi.matchDimensions(canvas, displaySize);

                setInterval(async () => {
                    if(isSmileDetected) return;

                    const detections = await faceapi.detectAllFaces(video, new faceapi.TinyFaceDetectorOptions()).withFaceExpressions();
                    const resized = faceapi.resizeResults(detections, displaySize);
                    canvas.getContext('2d').clearRect(0, 0, 480, 360);
                    
                    if (detections.length > 0) {
                        const expressions = detections[0].expressions;
                        
                        // ปรับเกณฑ์ความสุขให้แม่นยำขึ้น (> 0.7)
                        if (expressions.happy > 0.7) {
                            if (!smileStartTime) smileStartTime = Date.now();
                            const elapsed = Date.now() - smileStartTime;
                            const progress = Math.min((elapsed / smileTarget) * 100, 100);
                            smileBar.style.width = progress + '%';

                            if (elapsed >= smileTarget) {
                                isSmileDetected = true;
                                smileSuccess();
                            }
                        } else {
                            if(smileStartTime) {
                                smileStartTime = null;
                                smileBar.style.width = '0%';
                                // แจ้งเตือนสั้นๆ ผ่านสถานะหน้าจอ
                                statusText.style.display = 'block';
                                statusText.innerHTML = '<span style="color:#f1c40f;">อย่าหุบยิ้ม! นับใหม่นะ</span>';
                                setTimeout(() => { if(!isSmileDetected) statusText.style.display = 'none'; }, 2000);
                            }
                        }
                    }
                }, 200); // เช็คทุกๆ 0.2 วินาที
            });

            // เมื่อยิ้มสำเร็จ
            function smileSuccess() {
                Swal.fire({
                    title: 'รอยยิ้มสุดยอดเลย!',
                    text: 'ประตูสู่โลกอนาคตเปิดออกแล้ว ไปทำแบบทดสอบกัน!',
                    icon: 'success',
                    timer: 3000,
                    showConfirmButton: false
                });
                setTimeout(() => {
                    document.getElementById('scanStep').style.display = 'none';
                    document.getElementById('quizStep').style.display = 'block';
                    startQuiz();
                }, 3000);
            }

            // เริ่มการทำงานทั้งหมดเมื่อโหลด DOM สำเร็จ
            startApp();
        });

        // === 4. แบบทดสอบ 10 ข้อ จิตวิทยาอาชีพ ===
        const quizData = [
            { q: "ถ้ามีพลังวิเศษ, เธออยากใช้พลังนั้นทำอะไรที่สุด?", opts: [{t:"เขียนโปรแกรมควบคุมหุ่นยนต์ทั่วโลก",type:"tech"},{t:"รักษาโรคและช่วยเหลือคนยากไร้",type:"social"},{t:"ออกแบบโลกสมมติที่สวยงามเกินจริง",type:"creative"}] },
            { q: "งานกลุ่มที่เธอบ้าน, เธอชอบทำอะไรที่สุด?", opts: [{t:"หาข้อมูลและวางแผนให้เป็นระบบ",type:"tech"},{t:"เป็นผู้นำและไกล่เกลี่ยความขัดแย้ง",type:"social"},{t:"คิดไอเดียและออกแบบงานนำเสนอ",type:"creative"}] },
            { q: "ถ้าเจอหุ่นยนต์พังในห้องเรียน, เธออยากจะ...", opts: [{t:"พยายามแกะมาซ่อมเอง",type:"tech"},{t:"โทรเรียกคนมาซ่อม",type:"social"},{t:"เอามาแต่งเป็นงานศิลปะ",type:"creative"}] },
            { q: "เรื่องราวแบบไหนที่ทำให้เธอตื่นเต้นที่สุด?", opts: [{t:"การค้นพบนวัตกรรมเปลี่ยนโลก",type:"tech"},{t:"การช่วยเหลือคนพ้นภัยพิบัติ",type:"social"},{t:"การผจญภัยในโลกจินตนาการ",type:"creative"}] },
            { q: "ถ้าให้เลือกเป็นสี, สีไหนคือตัวเธอที่สุด?", opts: [{t:"สีฟ้าของเทคโนโลยีและความรู้",type:"tech"},{t:"สีเขียวของธรรมชาติและการดูแล",type:"social"},{t:"สีส้มของความสร้างสรรค์",type:"creative"}] },
            { q: "เวลาเจอโจทย์ปัญหายากๆ ในห้องเรียน...", opts: [{t:"ชอบแก้ด้วยตัวเองเงียบๆ",type:"tech"},{t:"ชอบถามเพื่อนและครู",type:"social"},{t:"ชอบหาคำตอบจากวิธีการแปลกๆ",type:"creative"}] },
            { q: "เธอชอบฟังนิทานเกี่ยวกับ...", opts: [{t:"เรื่องราวมหัศจรรย์ของวิทยาศาสตร์",type:"tech"},{t:"เรื่องราวเกี่ยวกับความช่วยเหลือ",type:"social"},{t:"เรื่องราวเกี่ยวกับโลกจินตนาการ",type:"creative"}] },
            { q: "เครื่องใช้ไฟฟ้าในฝันของเธอคือ?", opts: [{t:"คอมพิวเตอร์ที่พูดได้เหมือนคน",type:"tech"},{t:"เครื่องพยาบาลอัตโนมัติ",type:"social"},{t:"เครื่องสร้างสีสันตามอารมณ์",type:"creative"}] },
            { q: "งานฝีมือที่เธอชอบที่สุด?", opts: [{t:"ต่อตัวต่อหรือหุ่นยนต์",type:"tech"},{t:"ถักนิตติ้งหรือปักผ้า",type:"social"},{t:"วาดรูปหรือปั้นดินน้ำมัน",type:"creative"}] },
            { q: "วิชาที่เธอชอบที่สุด?", opts: [{t:"วิทยาศาสตร์หรือคณิตศาสตร์",type:"tech"},{t:"ภาษาไทยหรือสังคมศึกษา",type:"social"},{t:"ศิลปะหรือดนตรี",type:"creative"}] }
        ];

        let currentQ = 0;
        let scores = { tech: 0, social: 0, creative: 0 };

        function startQuiz() {
            const q = quizData[currentQ];
            let html = `<div class="question">${currentQ+1}. ${q.q}</div>`;
            q.opts.forEach(opt => { html += `<button class="option-btn" onclick="answerQuiz('${opt.type}')">${opt.t}</button>`; });
            document.getElementById('quizContent').innerHTML = html;
        }

        function answerQuiz(type) {
            scores[type]++;
            currentQ++;
            if(currentQ < quizData.length) { startQuiz(); } else { showResult(); }
        }

        // === 5. สรุปผลพร้อมข้อความกำลังใจ ===
        const results = {
            tech: { name:"วิศวกรซอฟต์แวร์อนาคต", emoji:"🚀", msg:"เธอมีความคิดที่เป็นระบบและหลงใหลในเทคโนโลยี! <br> โลกต้องการนักสร้างอย่างเธอเพื่อก้าวไปสู่ความก้าวหน้าใหม่ๆ นะ เดินตามความฝันต่อไป <br> ครูบิ๊กกี้ขอเป็นกำลังใจให้เธอสร้างนวัตกรรมที่เปลี่ยนโลกได้!" },
            social: { name:"ที่ปรึกษาด้านความสุข", emoji:"💖", msg:"ใจที่อ่อนโยนของเธอคือพลังที่ยิ่งใหญ่! <br> อาชีพที่ได้ช่วยเหลือผู้อื่นจะทำให้เธอมีความสุขและได้เติมเต็มความฝัน เดินตามเสียงหัวใจของเธอต่อไป <br> ครูบิ๊กกี้อยู่ข้างๆ และภูมิใจในตัวเธอเสมอ!" },
            creative: { name:"นักออกแบบโลกเสมือน (Metaverse Designer)", emoji:"🎨", msg:"จินตนาการของเธอไม่มีที่สิ้นสุด! <br> อย่าหยุดสร้างสรรค์สิ่งใหม่ๆ นะ เพราะความสวยงามของโลกนี้ขึ้นอยู่กับปลายพู่กันของเธอ เดินตามความฝันต่อไป <br> ครูบิ๊กกี้รอชมผลงานที่ยอดเยี่ยมของเธออยู่นะ!" }
        };

        function showResult() {
            document.getElementById('quizStep').style.display = 'none';
            document.getElementById('resultStep').style.display = 'block';

            let finalType = Object.keys(scores).reduce((a, b) => scores[a] > scores[b] ? a : b);
            const final = results[finalType];
            
            document.getElementById('careerName').innerText = final.name;
            document.getElementById('resultEmoji').innerText = final.emoji;
            document.getElementById('encourageMsg').innerHTML = final.msg;

            // ส่งข้อมูลลง Sheet
            fetch(GAS_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({ career: final.name, message: final.msg }) });
        }
    </script>
</body>
</html>
