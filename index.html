<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ประตูสู่โลกอนาคต โดย ครูบิ๊กกี้</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root {
            --primary: #00d2ff;
            --accent: #3a7bd5;
            --glass: rgba(255, 255, 255, 0.9);
            --text: #2c3e50;
        }

        * { box-sizing: border-box; }
        body, html {
            margin: 0; padding: 0; font-family: 'Prompt', sans-serif;
            min-height: 100vh; background: #0f2027;
            display: flex; justify-content: center; align-items: center;
            overflow-x: hidden; /* ป้องกันหน้าจอด้านข้างเลื่อน */
        }

        .bg-tech {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=1920&auto=format&fit=crop') center/cover;
            filter: blur(5px) brightness(0.4); z-index: -2;
        }

        .particles span {
            position: absolute; bottom: -50px; font-size: 2rem; opacity: 0.5;
            animation: floatUp 15s linear infinite; z-index: -1; pointer-events: none;
        }
        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            50% { opacity: 0.6; }
            100% { transform: translateY(-120vh) rotate(360deg); opacity: 0; }
        }

        .main-card {
            background: var(--glass); backdrop-filter: blur(15px);
            border-radius: 20px; width: 95%; max-width: 800px; /* ใช้ % เพื่อให้ยืดหยุ่น */
            padding: 25px; box-shadow: 0 15px 40px rgba(0,0,0,0.4);
            text-align: center; position: relative; border: 3px solid white;
            margin: 20px 0;
        }

        .header h1 { color: #1a252f; margin: 0; font-size: 1.8rem; text-shadow: 1px 1px 2px rgba(0,0,0,0.1); }
        .header p { color: #555; margin-bottom: 20px; font-size: 0.95rem; }

        /* แก้ไขกล่องสแกนใบหน้าให้สมดุลทุกหน้าจอ (Responsive) */
        .scan-container {
            position: relative; width: 100%; max-width: 480px; aspect-ratio: 4/3; /* รักษาสัดส่วน 4:3 อัตโนมัติ */
            margin: 0 auto; border-radius: 15px; overflow: hidden; border: 4px solid #fff;
            background: black; display: flex; justify-content: center; align-items: center;
        }
        /* ให้วิดีโอและแคนวาสขยายเต็มกล่องเสมอ */
        #video, #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        
        .status-msg { position: absolute; z-index: 10; color: white; font-weight: bold; font-size: 1.1rem; padding: 10px; text-align: center;}

        .bar-container { width: 100%; max-width: 480px; margin: 15px auto 0; background: #e0e0e0; height: 15px; border-radius: 10px; overflow: hidden; display: none; }
        #smile-bar { width: 0%; height: 100%; background: linear-gradient(90deg, #00d2ff, #3a7bd5); transition: width 0.3s ease; }

        .quiz-container { display: none; text-align: left; animation: fadeIn 0.8s; }
        .question { font-size: 1.2rem; font-weight: 600; margin-bottom: 15px; color: var(--text); border-bottom: 2px solid #ddd; padding-bottom: 10px; }
        .option-btn {
            display: block; width: 100%; padding: 12px 15px; margin-bottom: 10px;
            background: white; border: 2px solid #ddd; border-radius: 12px;
            cursor: pointer; font-family: 'Prompt'; font-size: 1rem; transition: 0.3s; text-align: left;
        }
        .option-btn:hover { background: #e3f2fd; border-color: var(--primary); transform: translateX(5px); box-shadow: 0 4px 8px rgba(0,0,0,0.05); }
        
        .result-container { display: none; animation: zoomIn 0.8s; }
        .career-title { font-size: 2rem; color: var(--accent); font-weight: bold; margin: 10px 0; }
        .encourage-text { font-size: 1.1rem; color: #444; line-height: 1.6; max-width: 600px; margin: 20px auto; }

        footer { margin-top: 25px; font-weight: bold; color: var(--text); opacity: 0.8; font-size: 0.9rem; }
        footer i { color: #f1c40f; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes zoomIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        /* ปรับขนาดฟอนต์บนมือถือ */
        @media (max-width: 480px) {
            .header h1 { font-size: 1.5rem; }
            .career-title { font-size: 1.6rem; }
            .main-card { padding: 15px; }
        }
    </style>
</head>
<body>
    <div class="bg-tech"></div>
    <div class="particles" id="emojiContainer"></div>

    <div class="main-card">
        <div id="scanStep">
            <div class="header">
                <h1><i class="fas fa-smile-wink"></i> ด่านตรวจความสุข</h1>
                <p>ยิ้มกว้างๆ ให้กล้องเป็นเวลา 5 วินาที เพื่อเปิดประตูสู่โลกอนาคต!</p>
            </div>
            <div class="scan-container">
                <div class="status-msg" id="statusText">กำลังเปิดกล้อง...</div>
                <video id="video" autoplay muted playsinline></video>
                <canvas id="overlay"></canvas>
            </div>
            <div class="bar-container" id="barUI">
                <div id="smile-bar"></div>
            </div>
        </div>

        <div id="quizStep" class="quiz-container">
            <div id="quizContent"></div>
        </div>

        <div id="resultStep" class="result-container">
            <h2 id="resultEmoji" style="font-size: 4rem; margin: 0;">🚀</h2>
            <div class="career-title" id="careerName"></div>
            <div class="encourage-text" id="encourageMsg"></div>
            <button class="option-btn" onclick="location.reload()" style="background: var(--primary); color:white; text-align:center; max-width:200px; margin: 0 auto;">ทำใหม่อีกครั้ง <i class="fas fa-redo"></i></button>
        </div>

        <footer>
            <i class="fas fa-magic"></i> สื่อสร้างสรรค์ โดย ครูบิ๊กกี้ | <i class="fas fa-robot"></i> AI Tech Lab
        </footer>
    </div>

    <script>
        // === ใส่ URL ของ Web App ตรงนี้ ===
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxMJ4iOa_49RTwGUlUuRUYLL9d6K9uehbfZ7qUf-IKxzfUbpbFJ1ObvU-RPYEiXm6YQ/exec"; 
        
        document.addEventListener("DOMContentLoaded", function() {
            const video = document.getElementById('video');
            const canvas = document.getElementById('overlay');
            const statusText = document.getElementById('statusText');
            const barUI = document.getElementById('barUI');
            const smileBar = document.getElementById('smile-bar');

            // 1. สร้าง Emojis ลอย
            const emojis = ['🏫', '😄', '📚', '🎨', '✨', '💡', '🤖', '🚀', '💻', '⚙️'];
            const container = document.getElementById('emojiContainer');
            for(let i=0; i<15; i++) {
                let span = document.createElement('span');
                span.innerText = emojis[Math.floor(Math.random()*emojis.length)];
                span.style.left = `${Math.random() * 100}vw`;
                span.style.animationDuration = `${Math.random() * 5 + 10}s`;
                span.style.animationDelay = `${Math.random() * 5}s`;
                container.appendChild(span);
            }

            // 2. ระบบ AI และกล้อง
            async function startApp() {
                try {
                    statusText.innerHTML = '<i class="fas fa-spinner fa-spin"></i> กำลังโหลด AI...';
                    
                    const MODEL_URL = 'https://cdn.jsdelivr.net/gh/justadudewhohacks/face-api.js@master/weights';
                    await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
                    await faceapi.nets.faceExpressionNet.loadFromUri(MODEL_URL);
                    
                    statusText.innerHTML = '<i class="fas fa-spinner fa-spin"></i> เตรียม AI สำเร็จ กำลังดึงภาพ...';
                    
                    // บังคับใช้กล้องหน้า (facingMode: "user") บนมือถือ
                    navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: false })
                        .then(stream => {
                            video.srcObject = stream;
                            statusText.style.display = 'none'; 
                        })
                        .catch(err => {
                            statusText.innerHTML = '<span style="color:#ff6b6b;"><i class="fas fa-video-slash"></i> ไม่พบกล้อง หรือถูกบล็อก</span>';
                        });

                } catch (error) {
                    statusText.innerHTML = '<span style="color:#ff6b6b;"><i class="fas fa-exclamation-triangle"></i> โหลด AI ไม่สำเร็จ</span>';
                }
            }

            let isSmileDetected = false;
            let smileStartTime = null;
            const smileTarget = 5000;

            video.addEventListener('play', () => {
                barUI.style.display = 'block';
                
                setInterval(async () => {
                    if(isSmileDetected) return;
                    
                    // ดึงขนาดจริงของวิดีโอที่แสดงผลบนหน้าจอ เพื่อให้แคนวาสวาดกรอบได้ตรงเวลาเปลี่ยนขนาดจอ
                    const displaySize = { width: video.offsetWidth, height: video.offsetHeight };
                    
                    if (canvas.width !== displaySize.width || canvas.height !== displaySize.height) {
                        faceapi.matchDimensions(canvas, displaySize);
                    }

                    const detections = await faceapi.detectAllFaces(video, new faceapi.TinyFaceDetectorOptions()).withFaceExpressions();
                    const resized = faceapi.resizeResults(detections, displaySize);
                    canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
                    
                    if (detections.length > 0) {
                        const happyScore = detections[0].expressions.happy;
                        if (happyScore > 0.7) {
                            if (!smileStartTime) smileStartTime = Date.now();
                            const elapsed = Date.now() - smileStartTime;
                            const progress = Math.min((elapsed / smileTarget) * 100, 100);
                            smileBar.style.width = progress + '%';

                            if (elapsed >= smileTarget) {
                                isSmileDetected = true;
                                smileSuccess();
                            }
                        } else {
                            if(smileStartTime) {
                                smileStartTime = null;
                                smileBar.style.width = '0%';
                                statusText.style.display = 'block';
                                statusText.innerHTML = '<span style="color:#f1c40f; text-shadow: 1px 1px 2px #000;">อย่าหุบยิ้ม! นับใหม่นะ</span>';
                                setTimeout(() => { if(!isSmileDetected) statusText.style.display = 'none'; }, 2000);
                            }
                        }
                    }
                }, 200);
            });

            function smileSuccess() {
                Swal.fire({
                    title: 'รอยยิ้มสุดยอดเลย!',
                    text: 'ประตูสู่โลกอนาคตเปิดออกแล้ว ไปค้นหาตัวเองกัน!',
                    icon: 'success',
                    timer: 2500,
                    showConfirmButton: false
                });
                setTimeout(() => {
                    document.getElementById('scanStep').style.display = 'none';
                    document.getElementById('quizStep').style.display = 'block';
                    startQuiz();
                }, 2500);
            }

            startApp();
        });

        // === 4. แบบทดสอบ 10 ข้อ (ปรับปรุงใหม่ตามหลักการวิเคราะห์บุคลิกภาพ) ===
        // tech = ชอบวิเคราะห์ ระบบ ข้อมูล (Investigative/Realistic)
        // social = ชอบช่วยเหลือ สื่อสาร คน (Social/Enterprising)
        // creative = ชอบจินตนาการ ศิลปะ นอกกรอบ (Artistic)
        const quizData = [
            { q: "เวลาทำงานกลุ่ม สิ่งที่เธอถนัดและทำได้ดีที่สุดคืออะไร?", opts: [{t:"หาข้อมูล ค้นหาความจริง และสรุปเหตุผล",type:"tech"},{t:"แบ่งหน้าที่ รับฟังความเห็น และประสานงานเพื่อนๆ",type:"social"},{t:"ตกแต่งรายงาน ออกแบบ หรือคิดวิธีนำเสนอเจ๋งๆ",type:"creative"}] },
            { q: "ถ้ามีเวลาว่าง 1 วัน เธออยากจะทำอะไรมากที่สุด?", opts: [{t:"ทดลองทำอะไรใหม่ๆ เล่นเกมวางแผน หรือดูสารคดี",type:"tech"},{t:"ไปเที่ยวกับเพื่อนๆ พูดคุย หรือทำกิจกรรมอาสาสมัคร",type:"social"},{t:"วาดรูป เล่นดนตรี ถ่ายคลิป หรือแต่งนิยาย",type:"creative"}] },
            { q: "ถ้าของเล่นหรือของใช้ส่วนตัวพัง เธอจะทำอย่างไรเป็นอย่างแรก?", opts: [{t:"หาสาเหตุ ลองแกะออกมาดู และพยายามซ่อมเอง",type:"tech"},{t:"ไปขอให้เพื่อน ผู้ปกครอง หรือช่างมาช่วยดูให้",type:"social"},{t:"เอาชิ้นส่วนที่พังมาดัดแปลงเป็นของประดับชิ้นใหม่",type:"creative"}] },
            { q: "ถ้าเธอได้เป็นผู้สร้างแอปพลิเคชัน แอปของเธอจะมีจุดเด่นเรื่องอะไร?", opts: [{t:"ระบบที่แม่นยำ ทำงานรวดเร็ว และมีฟีเจอร์ที่ซับซ้อน",type:"tech"},{t:"ระบบที่ช่วยให้คนแปลกหน้ามาเป็นเพื่อนและช่วยเหลือกัน",type:"social"},{t:"หน้าตาสวยงาม มีสีสัน และปรับแต่งกราฟิกได้อิสระ",type:"creative"}] },
            { q: "วิชาในห้องเรียนที่ทำให้เธอรู้สึกสนุกและท้าทายคือแบบไหน?", opts: [{t:"วิชาที่มีคำตอบตายตัว ใช้สูตรคำนวณ หรือการทดลอง (คณิต/วิทย์)",type:"tech"},{t:"วิชาที่ได้อภิปราย ได้พูดนำเสนอ หรือทำงานเป็นทีม (สังคม/ภาษา)",type:"social"},{t:"วิชาที่ไม่มีกรอบจำกัด ได้ใช้จินตนาการ (ศิลปะ/ดนตรี)",type:"creative"}] },
            { q: "ถ้าเธอต้องแก้ปัญหายากๆ วิธีการแบบไหนที่ใช่ตัวเธอที่สุด?", opts: [{t:"วิเคราะห์ข้อดีข้อเสียอย่างเป็นระบบและใช้เหตุผล",type:"tech"},{t:"ปรึกษาคนรอบข้างเพื่อหาทางออกที่ทุกคนพอใจ",type:"social"},{t:"มองข้ามกฎเดิมๆ แล้วคิดหาวิธีแก้ปัญหาที่แปลกใหม่",type:"creative"}] },
            { q: "เมื่อได้ดูหนังหรืออ่านหนังสือ เธอชอบเนื้อเรื่องแบบไหน?", opts: [{t:"แนวสืบสวน ไซไฟ หรือเรื่องที่มีทฤษฎีอ้างอิงชัดเจน",type:"tech"},{t:"แนวโรแมนติก ดราม่า หรือเรื่องที่เน้นความสัมพันธ์ของตัวละคร",type:"social"},{t:"แนวแฟนตาซี เวทมนตร์ หรือเรื่องที่มีภาพอลังการเหนือจินตนาการ",type:"creative"}] },
            { q: "ถ้าเธอได้รับพลังวิเศษ 1 อย่าง เธออยากได้พลังอะไร?", opts: [{t:"พลังแฮกเข้าระบบคอมพิวเตอร์และเข้าใจทุกภาษาบนโลก",type:"tech"},{t:"พลังอ่านความรู้สึกคนอื่นและรักษาความเจ็บปวดได้",type:"social"},{t:"พลังเสกภาพวาดในจินตนาการให้กลายเป็นของจริง",type:"creative"}] },
            { q: "คำชมแบบไหนที่ฟังแล้วทำให้เธอภูมิใจที่สุด?", opts: [{t:"\"เธอฉลาดและมีเหตุผลมากเลยนะ\"",type:"tech"},{t:"\"เธอเป็นคนใจดีและพึ่งพาได้เสมอ\"",type:"social"},{t:"\"ไอเดียของเธอไม่เหมือนใครและเจ๋งสุดๆ\"",type:"creative"}] },
            { q: "สภาพแวดล้อมการทำงานในฝันของเธอคือแบบไหน?", opts: [{t:"ห้องแล็บหรือโต๊ะที่มีจอคอมพิวเตอร์หลายๆ จอ ดูล้ำสมัย",type:"tech"},{t:"พื้นที่โล่งๆ ที่มีคนเดินผ่านไปมา ได้พูดคุยแลกเปลี่ยนตลอดเวลา",type:"social"},{t:"สตูดิโอที่มีสีสัน มีมุมพักผ่อนสบายๆ และไม่มีกฎเกณฑ์ตายตัว",type:"creative"}] }
        ];

        let currentQ = 0;
        let scores = { tech: 0, social: 0, creative: 0 };

        function startQuiz() {
            const q = quizData[currentQ];
            let html = `<div class="question">ข้อ ${currentQ+1}/10: ${q.q}</div>`;
            q.opts.forEach(opt => { 
                html += `<button class="option-btn" onclick="answerQuiz('${opt.type}')">${opt.t}</button>`; 
            });
            document.getElementById('quizContent').innerHTML = html;
        }

        function answerQuiz(type) {
            scores[type]++;
            currentQ++;
            if(currentQ < quizData.length) { startQuiz(); } else { showResult(); }
        }

        // === 5. สรุปผลการประเมิน ===
        const results = {
            tech: { 
                name:"นักนวัตกรรมและเทคโนโลยี (Tech & Logic)", 
                emoji:"🚀", 
                msg:"เธอมีความคิดที่เป็นระบบและมีเหตุผลที่ยอดเยี่ยม! อาชีพที่เหมาะกับเธอคือ <b>วิศวกรซอฟต์แวร์, นักวิทยาศาสตร์, หรือนักวิเคราะห์ข้อมูล</b> โลกต้องการนักสร้างสรรค์ระบบอย่างเธอ ครูบิ๊กกี้ขอเป็นกำลังใจให้ก้าวไปสู่ความก้าวหน้านะ!" 
            },
            social: { 
                name:"ผู้สร้างแรงบันดาลใจ (Social & Care)", 
                emoji:"💖", 
                msg:"ใจที่อ่อนโยนและทักษะการเข้าสังคมคือพลังที่ยิ่งใหญ่ของเธอ! อาชีพที่เหมาะกับเธอคือ <b>คุณครู, แพทย์, นักจิตวิทยา, หรือนักการทูต</b> อาชีพที่ได้ช่วยเหลือผู้อื่นจะทำให้เธอมีความสุข ครูบิ๊กกี้ภูมิใจในตัวเธอเสมอ!" 
            },
            creative: { 
                name:"ครีเอเตอร์นักออกแบบ (Art & Creative)", 
                emoji:"🎨", 
                msg:"จินตนาการของเธอไม่มีกรอบจำกัด! อาชีพที่เหมาะกับเธอคือ <b>นักออกแบบกราฟิก, สถาปนิก, นักเขียน, หรือนักสร้างคอนเทนต์</b> อย่าหยุดสร้างสรรค์สิ่งใหม่ๆ เพราะความสวยงามของโลกนี้รอผลงานของเธออยู่นะ ครูบิ๊กกี้รอชมเลย!" 
            }
        };

        function showResult() {
            document.getElementById('quizStep').style.display = 'none';
            document.getElementById('resultStep').style.display = 'block';

            let finalType = Object.keys(scores).reduce((a, b) => scores[a] > scores[b] ? a : b);
            const final = results[finalType];
            
            document.getElementById('careerName').innerText = final.name;
            document.getElementById('resultEmoji').innerText = final.emoji;
            document.getElementById('encourageMsg').innerHTML = final.msg;

            if(GAS_URL !== "YOUR_WEB_APP_URL_HERE") {
                fetch(GAS_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({ career: final.name, message: final.msg }) });
            }
        }
    </script>
</body>
</html>
